icons = "awesome"

[theme]
name = "gruvbox-dark"
# [theme.overrides]
# idle_bg = "#282828"
# idle_fg = "#a89984"
# info_bg = "#1d2021"
# info_fg = "#a89984"
# separator = ""
# separator_bg = "auto"
# separator_fg = "auto"
# warning_bg = "#282828"
# warning_fg = "#fabd2f"
# critical_bg = "#282828"
# critical_fg = "#fb4934"
# alternating_tint_bg = "#1d2021"
# alternating_tint_fg = "#32302f"


[[block]]
block = "focused_window"
max_width = 50
show_marks = "visible"

[[block]]
block = "music"
buttons = ["play", "next"]

[[block]]
block = "bluetooth"
mac = "94:DB:56:02:CF:44"
label = " Sony"

[[block]]
block = "disk_space"
path = "/"
alias = "/"
info_type = "available"
unit = "GB"
interval = 20
warning = 20.0
alert = 10.0

[[block]]
block = "net"
device = "wlp59s0"
format = "{signal_strength} {bitrate}"

[[block]]
block = "memory"
display_type = "memory"
format_mem = "{Mup}%"
format_swap = "{SUp}%"

[[block]]
block = "cpu"
interval = 1
format = " {utilization} {frequency}"

[[block]]
block = "load"
interval = 1
format = " {1m}"

[[block]]
block = "sound"

[[block]]
block = "maildir"
interval = 60
inboxes = ["/home/jboyens/.mail/flexe/INBOX", "/home/jboyens/.mail/fooninja/INBOX"]

[[block]]
block = "battery"
driver = "upower"
format = " {percentage}% {time}"
full_format = " "

[[block]]
block = "weather"
format = " {weather} {temp}°F"
service = { name = "openweathermap", api_key = "3cdaeb7234967fc9d96d74abead487e2", city_id = "5809844", units = "imperial" }

